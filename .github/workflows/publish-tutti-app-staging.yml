name: Publish Tutti App Staging

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: Tutti app id to publish.
        required: false
        default: daily-tech-radar
        type: choice
        options:
          - all
          - daily-tech-radar
          - tutti-onboarding
      publish_catalog:
        description: Whether to publish the staging App Center catalog after this release.
        required: false
        type: boolean
        default: false
      catalog_only:
        description: Whether to skip app release upload and only publish the existing latest release to staging catalog.
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      targets_json: ${{ steps.target.outputs.targets_json }}
    steps:
      - name: Checkout app repository
        uses: actions/checkout@v6

      - name: Resolve publish target
        id: target
        env:
          INPUT_APP_ID: ${{ github.event.inputs.app_id || '' }}
        run: node scripts/resolve-tutti-publish-target.mjs --environment staging --app "${INPUT_APP_ID}"

  publish:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.resolve.outputs.targets_json) }}
    concurrency:
      group: tutti-app-staging-${{ matrix.target.app_id }}
      cancel-in-progress: false
    uses: tutti-os/tutti/.github/workflows/publish-tutti-app-release.yml@main
    with:
      app_id: ${{ matrix.target.app_id }}
      package_command: ${{ matrix.target.package_command }}
      package_dir: ${{ matrix.target.package_dir }}
      icon_path: ${{ matrix.target.icon_path }}
      release_tag_prefix: ${{ matrix.target.release_tag_prefix }}
      runner: macos-latest
      pnpm_version: 10.26.2
      aws_region: ${{ vars.TUTTI_APP_RELEASES_STAGING_AWS_REGION || vars.TUTTI_APP_RELEASES_AWS_REGION }}
      aws_role_arn: ${{ vars.TUTTI_APP_RELEASES_STAGING_AWS_ROLE_ARN || vars.TUTTI_APP_RELEASES_AWS_ROLE_ARN }}
      s3_bucket: ${{ vars.TUTTI_APP_RELEASES_STAGING_S3_BUCKET || vars.TUTTI_APP_RELEASES_S3_BUCKET }}
      s3_prefix: ${{ vars.TUTTI_APP_RELEASES_STAGING_S3_PREFIX || 'tutti-app-releases-staging' }}
      release_assets_base_url: ${{ vars.TUTTI_APP_RELEASES_STAGING_BASE_URL || 'https://d1x7gb6wqsqmnm.cloudfront.net/tutti-app-releases-staging' }}
      publish_catalog: ${{ inputs.publish_catalog }}
      catalog_only: ${{ inputs.catalog_only }}
      catalog_cloudfront_distribution_id: ${{ vars.TUTTI_APP_RELEASES_STAGING_CLOUDFRONT_DISTRIBUTION_ID || vars.TUTTI_APP_RELEASES_CLOUDFRONT_DISTRIBUTION_ID || '' }}
