<svg xmlns="http://www.w3.org/2000/svg" width="726" height="726" viewBox="0 0 726 726">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <filter id="diskShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#16a34a" flood-opacity="0.38"/>
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#166534" flood-opacity="0.28"/>
    </filter>
    <radialGradient id="cardGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="66%" stop-color="#fbfbf8"/>
      <stop offset="100%" stop-color="#f1f2ef"/>
    </radialGradient>
    <radialGradient id="greenDisk" cx="38%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#76df83"/>
      <stop offset="52%" stop-color="#2fc85a"/>
      <stop offset="100%" stop-color="#15913c"/>
    </radialGradient>
    <linearGradient id="diskRim" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eaffec" stop-opacity="0.68"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0b6f2b" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="symbolShade" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4fff6"/>
    </linearGradient>
    <pattern id="fineTexture" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M8 28 C16 17 21 15 30 6" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
      <path d="M-4 12 C7 16 16 16 26 9" fill="none" stroke="#0b6f2b" stroke-opacity="0.06" stroke-width="2"/>
    </pattern>
  </defs>
  <rect x="1" y="1" width="724" height="724" rx="132" fill="url(#cardGradient)" filter="url(#cardShadow)"/>
  <path d="M81 671 C215 707 506 708 645 671" fill="none" stroke="#d2d6d3" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
  <circle cx="363" cy="356" r="246" fill="url(#greenDisk)" filter="url(#diskShadow)"/>
  <circle cx="363" cy="356" r="228" fill="url(#fineTexture)" opacity="0.95"/>
  <circle cx="363" cy="356" r="239" fill="none" stroke="url(#diskRim)" stroke-width="14"/>
  <circle cx="363" cy="356" r="216" fill="none" stroke="#0b7d34" stroke-opacity="0.24" stroke-width="5"/>
  <path d="M216 255 H316 C344 255 363 274 363 302 V409 C363 438 383 457 412 457 H512" fill="none" stroke="url(#symbolShade)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="214" cy="255" r="47" fill="url(#symbolShade)"/>
  <circle cx="363" cy="356" r="49" fill="url(#symbolShade)"/>
  <circle cx="512" cy="457" r="47" fill="url(#symbolShade)"/>
  <path d="M493 359 L541 407 L624 303" fill="none" stroke="url(#symbolShade)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M246 208 C314 164 420 159 498 204" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" opacity="0.28"/>
  <path d="M197 525 C285 584 435 592 530 523" fill="none" stroke="#0a742f" stroke-width="14" stroke-linecap="round" opacity="0.18"/>
</svg>
