<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GitHub Trending Reader</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #071316;
        color: #eaf7f4;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(32, 227, 178, 0.16), transparent 32rem),
          #071316;
      }
      main {
        width: min(760px, calc(100vw - 48px));
        border: 1px solid rgba(132, 180, 177, 0.22);
        border-radius: 12px;
        background: rgba(11, 31, 36, 0.86);
        padding: 32px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.15;
      }
      p {
        color: #aec8c5;
        line-height: 1.65;
        margin: 0 0 20px;
      }
      code {
        color: #20e3b2;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>GitHub Trending Reader</h1>
      <p>
        This Nextop package placeholder is ready. The planned app is a category-first
        GitHub Trending reader with README thumbnails and a README-only detail panel.
      </p>
      <p>Next implementation step: scaffold <code>TanStack Start + Tailwind + shadcn/ui</code>.</p>
    </main>
  </body>
</html>
